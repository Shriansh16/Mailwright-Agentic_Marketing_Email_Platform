name: Python CI

on:
  push:
    branches: [ sprint1, main ] # Triggers on pushes to sprint1 and main
  pull_request:
    branches: [ sprint1, main ] # Triggers on pull requests to sprint1 and main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checks out your repository under $GITHUB_WORKSPACE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Specify your project's Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff # Install Ruff linter
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github
          # To also format and fail on formatting issues (optional):
          # ruff format --check .

